# pip configuration — community (PyPI) defaults
# Reference: https://pip.pypa.io/en/stable/topics/configuration/
#
# This file is written to ${TEMP_DIR}/pip/pip.conf before any pip invocation.
# The env var PIP_CONFIG_FILE is set to this path so it overrides any user or
# system pip.conf already present on the machine. This ensures reproducible,
# environment-independent behaviour.
#
# To adapt for a private / corporate environment:
# - Replace index-url with your internal PyPI mirror
# - Add extra-index-url entries for supplementary indexes
# - Set trusted-host if your internal server uses self-signed TLS
# - See references/installation-sources.md for the complete override guide

[global]
index-url = https://pypi.org/simple/
trusted-host = pypi.org
               files.pythonhosted.org
timeout = 60
retries = 3
no-input = true

[install]
# Never install from cache when generating SBOMs — always resolve fresh
no-cache-dir = true
# Do not use pre-release packages
pre = false
